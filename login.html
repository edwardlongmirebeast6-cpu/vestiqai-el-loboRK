<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | VestIQAI EL LOBO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: #f5f5f5;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .logo {
      max-width: 260px;
      width: 100%;
      margin: 0 auto 24px;
      display: block;
      border-radius: 18px;
    }

    .card {
      background: #111111;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      padding: 28px;
      text-align: left;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      color: #c8c8c8;
      line-height: 1.6;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #0d0d0d;
      color: white;
      box-sizing: border-box;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .btn {
      width: 100%;
      background: #b30d0d;
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 8px;
      font-size: 16px;
    }

    .btn:hover {
      background: #8f0a0a;
    }

    .status {
      margin-top: 14px;
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      min-height: 24px;
      line-height: 1.4;
    }

    .status.success {
      color: #33cc99;
    }

    .link {
      display: block;
      margin-top: 16px;
      text-align: center;
      color: #c8c8c8;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="logo-main.PNG" alt="VestIQAI EL LOBO logo" />

    <div class="card">
      <h1>Login / Sign Up</h1>
      <p>Access your dashboard, subscription, and AI plans.</p>

      <input id="email" type="email" placeholder="Email address" autocomplete="email" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <button class="btn" type="button" onclick="signUp()">Create Account</button>
      <button class="btn" type="button" onclick="signIn()">Login</button>

      <div id="status" class="status"></div>
      <a class="link" href="/">← Back to homepage</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://kquoernnqusqbviicymg.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_OaS8RdnSO95xX3XfLFfRGw_WlkonKoF";

    const statusEl = document.getElementById("status");

    function setStatus(message, success = false) {
      statusEl.textContent = message;
      statusEl.className = success ? "status success" : "status";
    }

    if (!window.supabase || !window.supabase.createClient) {
      setStatus("Supabase script failed to load.");
    }

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY
    );

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setStatus("Please enter your email and password.");
        return;
      }

      if (password.length < 6) {
        setStatus("Password must be at least 6 characters.");
        return;
      }

      setStatus("Creating account...");

      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password
        });

        if (error) {
          setStatus(error.message);
          return;
        }

        if (data?.user && !data?.session) {
          setStatus("Account created. You can log in now.", true);
          return;
        }

        setStatus("Account created successfully. Redirecting...", true);
        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 700);
      } catch (err) {
        console.error(err);
        setStatus("Signup failed. Check your connection and Supabase settings.");
      }
    }

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setStatus("Please enter your email and password.");
        return;
      }

      setStatus("Logging in...");

      try {
        const { error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          setStatus(error.message);
          return;
        }

        setStatus("Login successful. Redirecting...", true);
        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 500);
      } catch (err) {
        console.error(err);
        setStatus("Login failed. Check your connection and Supabase settings.");
      }
    }

    async function checkSession() {
      try {
        const { data } = await supabase.auth.getSession();
        if (data?.session) {
          window.location.href = "/dashboard.html";
        }
      } catch (err) {
        console.error("Session check failed:", err);
      }
    }

    checkSession();
  </script>
</body>
</html>
