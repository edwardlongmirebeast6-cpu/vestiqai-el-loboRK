<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Test | VestIQAI EL LOBO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: #f5f5f5;
      text-align: center;
      padding: 40px 20px;
    }
    .box {
      max-width: 520px;
      margin: 0 auto;
      background: #111;
      border: 1px solid #222;
      border-radius: 18px;
      padding: 24px;
    }
    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      box-sizing: border-box;
      border-radius: 10px;
      font-size: 16px;
    }
    input {
      background: #0d0d0d;
      color: white;
      border: 1px solid #2a2a2a;
    }
    button {
      background: #b30d0d;
      color: white;
      border: none;
      font-weight: bold;
    }
    #status {
      margin-top: 16px;
      min-height: 24px;
      color: #ff8080;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>LOGIN TEST V2</h1>
    <p>If you do not see "LOGIN TEST V2", you are on an old page.</p>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button type="button" onclick="testClick()">Test Button</button>
    <button type="button" onclick="signUp()">Create Account</button>
    <button type="button" onclick="signIn()">Login</button>

    <div id="status">Page loaded.</div>
  </div>

  <script>
    const SUPABASE_URL = "https://kquoernnqusqbviicymg.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_OaS8RdnSO95xX3XfLFfRGw_WlkonKoF";

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function testClick() {
      alert("Button click works");
      setStatus("Test button worked.");
    }

    let supabase = null;

    try {
      if (!window.supabase || !window.supabase.createClient) {
        setStatus("Supabase CDN did not load.");
      } else {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
        setStatus("Supabase loaded successfully.");
      }
    } catch (e) {
      setStatus("Supabase init failed: " + e.message);
    }

    async function signUp() {
      try {
        if (!supabase) {
          setStatus("Supabase client missing.");
          return;
        }

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        setStatus("Create Account clicked...");

        const { data, error } = await supabase.auth.signUp({ email, password });

        if (error) {
          setStatus("Signup error: " + error.message);
          return;
        }

        setStatus("Signup success.");
      } catch (e) {
        setStatus("Signup crashed: " + e.message);
      }
    }

    async function signIn() {
      try {
        if (!supabase) {
          setStatus("Supabase client missing.");
          return;
        }

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        setStatus("Login clicked...");

        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          setStatus("Login error: " + error.message);
          return;
        }

        setStatus("Login success. Redirecting...");
        window.location.href = "/dashboard.html";
      } catch (e) {
        setStatus("Login crashed: " + e.message);
      }
    }
  </script>
</body>
</html>
