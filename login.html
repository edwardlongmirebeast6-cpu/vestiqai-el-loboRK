<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | VestIQAI EL LOBO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: #f5f5f5;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .logo {
      max-width: 260px;
      width: 100%;
      margin: 0 auto 24px;
      display: block;
      border-radius: 18px;
    }

    .card {
      background: #111111;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      padding: 28px;
      text-align: left;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      color: #c8c8c8;
      line-height: 1.6;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #0d0d0d;
      color: white;
      box-sizing: border-box;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .btn {
      width: 100%;
      background: #b30d0d;
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 8px;
      font-size: 16px;
    }

    .btn:hover {
      background: #8f0a0a;
    }

    .status {
      margin-top: 14px;
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      min-height: 24px;
      line-height: 1.4;
    }

    .status.success {
      color: #33cc99;
    }

    .link {
      display: block;
      margin-top: 16px;
      text-align: center;
      color: #c8c8c8;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="logo-main.PNG" alt="VestIQAI EL LOBO logo" />

    <div class="card">
      <h1>Login / Sign Up</h1>
      <p>Access your dashboard, subscription, and AI plans.</p>

      <input id="email" type="email" placeholder="Email address" autocomplete="email" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <button id="signupBtn" class="btn" type="button">Create Account</button>
      <button id="loginBtn" class="btn" type="button">Login</button>

      <div id="status" class="status"></div>
      <a class="link" href="/">← Back to homepage</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://kquoernnqusqbviicymg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_OaS8RdnSO95xX3XfLFfRGw_WlkonKoF";

    function setStatus(message, success = false) {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = success ? "status success" : "status";
    }

    async function initAuth() {
      if (!window.supabase || !window.supabase.createClient) {
        setStatus("Supabase failed to load. Refresh the page and try again.");
        return;
      }

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const signupBtn = document.getElementById("signupBtn");
      const loginBtn = document.getElementById("loginBtn");

      signupBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          setStatus("Please enter your email and password.");
          return;
        }

        if (password.length < 6) {
          setStatus("Password must be at least 6 characters.");
          return;
        }

        setStatus("Creating account...");

        try {
          const { data, error } = await supabase.auth.signUp({
            email,
            password
          });

          if (error) {
            setStatus(error.message);
            return;
          }

          if (data && data.user) {
            setStatus("Account created successfully. You can log in now.", true);
          } else {
            setStatus("Account created. Check your email if confirmation is enabled.", true);
          }
        } catch (err) {
          setStatus("Something went wrong creating your account.");
        }
      });

      loginBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          setStatus("Please enter your email and password.");
          return;
        }

        setStatus("Logging in...");

        try {
          const { error } = await supabase.auth.signInWithPassword({
            email,
            password
          });

          if (error) {
            setStatus(error.message);
            return;
          }

          window.location.href = "/Dashboard.html";
        } catch (err) {
          setStatus("Something went wrong logging in.");
        }
      });
    }

    window.addEventListener("DOMContentLoaded", initAuth);
  </script>
</body>
</html>
